  <!-- MAIN -->
  <div class="form-page">
    <div class="container" style="max-width:760px;">

      <div class="form-header">
        <a href="./servicos.html" class="btn-back">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" viewBox="0 0 16 16"><path fill-rule="evenodd" d="M1 8a7 7 0 1 0 14 0A7 7 0 0 0 1 8m15 0A8 8 0 1 1 0 8a8 8 0 0 1 16 0m-4.5-.5a.5.5 0 0 1 0 1H5.707l2.147 2.146a.5.5 0 0 1-.708.708l-3-3a.5.5 0 0 1 0-.708l3-3a.5.5 0 1 1 .708.708L5.707 7.5z"/></svg>

        <div>
          <p class="form-subtitle">Moto Elétrica</p>
          <h1 class="form-title">Entrega Busca Busca</h1>
        </div>
        <div class="tag-badge" style="margin-left:auto;">Coleta 24h</div>
      </div>

      <div id="msg_retorno"><div id="msg_exibicao"></div></div>

      <form id="form" autocomplete="off">

        <!-- Rota -->
        <div class="form-card">
          <div class="form-card-title">Rota de entrega</div>
          <div class="form-row cols-3">
            <div><label>Origem</label><input type="text" class="form-control" value="São Paulo" disabled></div>
            <div>
              <label>Destino (CEP) <span class="obrigatorio">* obrigatório</span></label>
              <input id="cep_dest_buscabusca" type="text" class="form-control" placeholder="Ex: 08057220" maxlength="8" onkeypress="apenasNumeros(event)" onchange="mascaraCEP()">
            </div>
            <div>
              <label>Categoria</label>
              <select id="BuscaBuscaTipoCarga" class="form-control" name="TipoCarga">
                <option value="Moto Elétrica">Moto Elétrica</option>
              </select>
            </div>
          </div>
        </div>

        <!-- Endereço destino (aparece após CEP) -->
        <div id="endereco_log_buscabusca" class="form-card" hidden>
          <div class="form-card-title">Endereço de entrega</div>
          <div class="form-row cols-2">
            <div><label>Logradouro</label><input type="text" class="form-control" disabled id="end_entrega_buscabusca"></div>
            <div><label>Bairro</label><input type="text" class="form-control" disabled id="bairro_entrega_buscabusca"></div>
          </div>
          <div class="form-row cols-2" style="margin-top:16px;">
            <div><label>Número <span class="obrigatorio">* obrigatório</span></label><input type="text" class="form-control" id="num_entrega_buscabusca" placeholder="Ex: 123"></div>
          </div>
        </div>

        <!-- Dados carga -->
        <div class="form-card">
          <div class="form-card-title">Dados da carga</div>
          <div class="form-row cols-4">
            <div style="grid-column: span 2;">
              <label>Nome completo <span class="obrigatorio">* obrigatório</span></label>
              <input required type="text" class="form-control" id="fullNameBuscaBusca" placeholder="Ex: João Pedro da Silva" maxlength="50">
            </div>
            <div>
              <label>Peso (kg) <span class="obrigatorio">opcional</span></label>
              <input type="text" class="form-control" id="peso_carga_busca_busca" placeholder="Ex: 5" maxlength="10" onkeypress="apenasNumeros(event)">
            </div>
            <div>
              <label>Telefone <span class="obrigatorio">opcional</span></label>
              <input type="text" class="form-control" placeholder="11 9XXXX XXXX" maxlength="11" onkeypress="apenasNumeros(event)">
            </div>
          </div>
          <div style="margin-top:20px;">
            <label>Prazo de coleta</label>
            <input type="text" class="form-control" value="24 Horas" disabled style="max-width:200px;">
          </div>
        </div>

        <div class="form-actions" style="justify-content:flex-end;">
          <button type="button" id="Continuar" class="btn-primary-custom" onclick="openModal();">
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="currentColor" viewBox="0 0 16 16"><path d="M4 10.781c.148 1.667 1.513 2.85 3.591 3.003V15h1.043v-1.216c2.27-.179 3.678-1.438 3.678-3.3 0-1.59-.947-2.51-2.956-3.028l-.722-.187V3.467c1.122.11 1.879.714 2.07 1.616h1.47c-.166-1.6-1.54-2.748-3.54-2.875V1H7.591v1.233c-1.939.23-3.27 1.472-3.27 3.156 0 1.454.966 2.483 2.661 2.917l.61.162v4.031c-1.149-.17-1.94-.8-2.131-1.718zm3.391-3.836c-1.043-.263-1.6-.825-1.6-1.616 0-.944.704-1.641 1.8-1.828v3.495l-.2-.05zm1.591 1.872c1.287.323 1.852.859 1.852 1.769 0 1.097-.826 1.828-2.2 1.939V8.73z"/></svg>
            Fazer Simulação
          </button>
        </div>

      </form>
    </div>
  </div>

            <div class="resumo-row">
              <label>Origem</label>

            </div>
            <div class="resumo-row">
              <label>Destino</label>
              <span class="resumo-val" id="destino_modal_buscabusca"></span>
            </div>
            <div class="resumo-row">
              <label>Categoria</label>
              <span class="resumo-val" id="categoria_mer_buscabusca"></span>
            </div>
            <div class="resumo-row">
              <label>Distância</label>
              <span class="resumo-val" id="km_modal_buscabusca"></span>
            </div>
            <div class="resumo-row" id="ctResumoCotacao">
              <div>
                <label>Valor do frete</label>
                <div id="valorFrete_modal_buscabusca"></div>
              </div>
            </div>
            <div id="msg_aviso_entrega_coleta_bb" style="margin-top:8px;">
              <label id="msg_valorNaoAtribuioColeta">O preço pode variar conforme o clima, o dia, eventos e outros fatores.</label>
            </div>
          </div>

          <!-- Footer -->
          <div class="modal-footer">
